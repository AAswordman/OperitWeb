name = "market-stats"
main = "src/index.js"
compatibility_date = "2026-04-20"
account_id = "c667bf70582c5ceceda8d3d183ad8e3b"
workers_dev = false

[[routes]]
pattern = "api.operit.app"
custom_domain = true

[vars]
MARKET_ROUTE_PREFIX = "/market-stats"
MARKET_STATIC_OBJECT_PREFIX = "market-stats"
MARKET_ALLOWED_ORIGINS = "*"
MARKET_ALLOWED_DOWNLOAD_HOSTS = "github.com,objects.githubusercontent.com,release-assets.githubusercontent.com,raw.githubusercontent.com"
MARKET_SUPPORTED_TYPES = "script,package,skill,mcp"
MARKET_RANK_PAGE_SIZE = "20"
MARKET_RANK_MAX_PAGES = "0"
MARKET_JSON_CACHE_MAX_AGE = "300"
MARKET_ANALYTICS_ACCOUNT_ID = "c667bf70582c5ceceda8d3d183ad8e3b"
MARKET_ANALYTICS_DATASET = "operit_market_stats"

[triggers]
crons = ["0 */6 * * *"]

[[analytics_engine_datasets]]
binding = "MARKET_ANALYTICS"
dataset = "operit_market_stats"

[[r2_buckets]]
binding = "MARKET_STATS_BUCKET"
bucket_name = "operit-market-stats-static"

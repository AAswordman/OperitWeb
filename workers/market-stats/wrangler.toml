name = "market-stats"
main = "src/index.js"
compatibility_date = "2026-04-20"
account_id = "c667bf70582c5ceceda8d3d183ad8e3b"
workers_dev = false

[[routes]]
pattern = "api.operit.app"
custom_domain = true

[vars]
MARKET_ROUTE_PREFIX = "/market-stats"
MARKET_ALLOWED_ORIGINS = "*"
MARKET_ALLOWED_DOWNLOAD_HOSTS = "github.com,objects.githubusercontent.com,release-assets.githubusercontent.com,raw.githubusercontent.com"
MARKET_SUPPORTED_TYPES = "script,package,skill,mcp"
MARKET_RANK_PAGE_SIZE = "20"
MARKET_RANK_MAX_PAGES = "5"
MARKET_JSON_CACHE_MAX_AGE = "300"

[triggers]
crons = ["*/15 * * * *"]

[[d1_databases]]
binding = "MARKET_STATS_DB"
database_name = "operit-market-stats"
database_id = "276b4876-9e9b-4660-9adc-9e1d38abdf03"

[[kv_namespaces]]
binding = "MARKET_STATS_CACHE"
id = "2d348a7b9c114bcdb0d02ea204317861"
